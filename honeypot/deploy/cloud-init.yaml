#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# Tripwire honeypot — one-shot VPS provisioning (DigitalOcean / Linode / Vultr).
#
# Paste the ENTIRE contents of this file into the "user data" field when you
# create the droplet. On first boot it will, in order:
#   1. Move the real sshd to port 64295 (so Cowrie can own port 22).
#   2. Firewall: admin SSH on 64295, honeypot open on 22/23, deny everything else.
#   3. Install Docker Engine + the compose plugin.
#   4. Drop the Cowrie config and start the honeypot on 22 (SSH) and 23 (Telnet).
#
# ⚠  AFTER this runs, reconnect on the NEW port:   ssh -p 64295 root@<droplet-ip>
#    (Add your SSH public key in the droplet-creation UI — do NOT rely on a
#     password.) If anything goes wrong, use the provider's web console to recover.
# ─────────────────────────────────────────────────────────────────────────────

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - ufw

write_files:
  - path: /opt/tripwire/honeypot/.env
    content: |
      SSH_LISTEN_PORT=22
      TELNET_LISTEN_PORT=23

  - path: /opt/tripwire/honeypot/docker-compose.yml
    content: |
      name: tripwire-honeypot
      services:
        cowrie:
          image: cowrie/cowrie:latest
          container_name: tripwire-cowrie
          restart: unless-stopped
          ports:
            - "${SSH_LISTEN_PORT:-2222}:2222"
            - "${TELNET_LISTEN_PORT:-2223}:2223"
          volumes:
            - ./cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
            - ./userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
            - ./var:/cowrie/cowrie-git/var
          networks: [honeypot-net]
      networks:
        honeypot-net:
          driver: bridge

  - path: /opt/tripwire/honeypot/cowrie.cfg
    content: |
      [honeypot]
      hostname = svr01
      log_path = var/log/cowrie
      download_path = var/lib/cowrie/downloads
      ttylog = true
      ttylog_path = var/lib/cowrie/tty
      auth_class = UserDB
      [ssh]
      enabled = true
      listen_endpoints = tcp:2222:interface=0.0.0.0
      version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5
      [telnet]
      enabled = true
      listen_endpoints = tcp:2223:interface=0.0.0.0
      [output_jsonlog]
      enabled = true
      logfile = var/log/cowrie/cowrie.json
      epoch_timestamp = true

  - path: /opt/tripwire/honeypot/userdb.txt
    content: |
      root:x:*
      admin:x:*
      ubuntu:x:*
      user:x:*
      test:x:*
      oracle:x:*
      pi:x:*

runcmd:
  # 1. Move real sshd off 22. Handle BOTH classic service (22.04) and
  #    socket-activated ssh (24.04, where sshd_config's Port is ignored).
  - sed -i 's/^#\?Port .*/Port 64295/' /etc/ssh/sshd_config
  - mkdir -p /etc/systemd/system/ssh.socket.d
  - printf '[Socket]\nListenStream=\nListenStream=64295\n' > /etc/systemd/system/ssh.socket.d/override.conf
  - systemctl daemon-reload
  - systemctl restart ssh.socket 2>/dev/null || true
  - systemctl restart ssh 2>/dev/null || systemctl restart sshd 2>/dev/null || true

  # 2. Firewall. (Docker publishes 22/23 via its own iptables chain, so those
  #    stay reachable regardless; the allow rules document intent.)
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 64295/tcp
  - ufw allow 22/tcp
  - ufw allow 23/tcp
  - ufw --force enable

  # 3. Docker Engine + compose plugin.
  - curl -fsSL https://get.docker.com | sh

  # 4. Cowrie's image runs as a named 'cowrie' user (a non-1000 uid), so a
  #    host chown to 1000 does NOT grant write access. Make the bind-mounted
  #    var/ world-writable (it only holds honeypot logs/state). Without this
  #    Cowrie can't create its SSH host key and port 22 stays dead.
  - mkdir -p /opt/tripwire/honeypot/var/log/cowrie /opt/tripwire/honeypot/var/lib/cowrie/downloads /opt/tripwire/honeypot/var/lib/cowrie/tty
  - chmod -R 777 /opt/tripwire/honeypot/var

  # 5. Launch.
  - cd /opt/tripwire/honeypot && docker compose up -d

  # ── Phase 2 (later): uncomment to join a Tailscale tunnel back to the Wazuh
  #    manager on TheHive-5, so the agent can ship cowrie.json privately.
  # - curl -fsSL https://tailscale.com/install.sh | sh
  # - tailscale up --auth-key=tskey-XXXX --hostname=tripwire-honeypot

final_message: "Tripwire honeypot is up. Reconnect on port 64295. Live capture: tail -f /opt/tripwire/honeypot/var/log/cowrie/cowrie.json"
