#cloud-config
# ─────────────────────────────────────────────────────────────────────────────
# Tripwire honeypot — Oracle Cloud "Always Free" provisioning.
#
# Paste the ENTIRE contents into "Show advanced options → Initialization script"
# (user data) when you create the instance. On first boot it will:
#   1. Move the real sshd to port 64295 (so Cowrie can own port 22).
#   2. Open 22 / 23 / 64295 in the HOST iptables (Oracle's Ubuntu image ships
#      with a default-DROP INPUT chain — this is the #1 "why can't I connect"
#      gotcha) and persist the rules.
#   3. Install Docker + compose and start Cowrie on 22 (SSH) and 23 (Telnet).
#
# ⚠  YOU MUST ALSO open 22, 23, and 64295 (TCP, ingress, 0.0.0.0/0) in the
#    instance's VCN **Security List** in the Oracle console — that is a
#    CLOUD-LEVEL firewall this script cannot touch. Both firewalls must allow a
#    port or traffic never arrives. See README.oracle.md.
#
# ⚠  Default login user on the Oracle Ubuntu image is `ubuntu` (NOT root).
#    After boot, reconnect on the new port:  ssh -p 64295 ubuntu@<public-ip>
# ─────────────────────────────────────────────────────────────────────────────

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - iptables-persistent

write_files:
  - path: /opt/tripwire/honeypot/.env
    content: |
      SSH_LISTEN_PORT=22
      TELNET_LISTEN_PORT=23

  - path: /opt/tripwire/honeypot/docker-compose.yml
    content: |
      name: tripwire-honeypot
      services:
        cowrie:
          image: cowrie/cowrie:latest
          container_name: tripwire-cowrie
          restart: unless-stopped
          ports:
            - "${SSH_LISTEN_PORT:-2222}:2222"
            - "${TELNET_LISTEN_PORT:-2223}:2223"
          volumes:
            - ./cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
            - ./userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
            - ./var:/cowrie/cowrie-git/var
          networks: [honeypot-net]
      networks:
        honeypot-net:
          driver: bridge

  - path: /opt/tripwire/honeypot/cowrie.cfg
    content: |
      [honeypot]
      hostname = svr01
      log_path = var/log/cowrie
      download_path = var/lib/cowrie/downloads
      ttylog = true
      ttylog_path = var/lib/cowrie/tty
      auth_class = UserDB
      [ssh]
      enabled = true
      listen_endpoints = tcp:2222:interface=0.0.0.0
      version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5
      [telnet]
      enabled = true
      listen_endpoints = tcp:2223:interface=0.0.0.0
      [output_jsonlog]
      enabled = true
      logfile = var/log/cowrie/cowrie.json
      epoch_timestamp = true

  - path: /opt/tripwire/honeypot/userdb.txt
    content: |
      root:x:*
      admin:x:*
      ubuntu:x:*
      user:x:*
      test:x:*
      oracle:x:*
      pi:x:*

runcmd:
  # 1. Move real sshd off 22 (classic service AND 24.04 socket-activation).
  - sed -i 's/^#\?Port .*/Port 64295/' /etc/ssh/sshd_config
  - mkdir -p /etc/systemd/system/ssh.socket.d
  - printf '[Socket]\nListenStream=\nListenStream=64295\n' > /etc/systemd/system/ssh.socket.d/override.conf
  - systemctl daemon-reload

  # 2. HOST firewall — insert ACCEPTs at the TOP of INPUT so they beat Oracle's
  #    default REJECT, then persist. (Admin SSH 64295 goes through INPUT; Cowrie's
  #    22/23 are Docker-published and bypass INPUT via the DOCKER chain, but we
  #    open them too for clarity/robustness.)
  - iptables -I INPUT -p tcp --dport 64295 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 22 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 23 -j ACCEPT
  - netfilter-persistent save

  # Restart ssh onto the new port AFTER the firewall allows it.
  - systemctl restart ssh.socket 2>/dev/null || true
  - systemctl restart ssh 2>/dev/null || systemctl restart sshd 2>/dev/null || true

  # 3. Docker Engine + compose plugin (works on arm64 and x86_64).
  - curl -fsSL https://get.docker.com | sh

  # 4. Cowrie's image runs as a named 'cowrie' user (a non-1000 uid), so a
  #    host chown to 1000 does NOT grant write access. Make the bind-mounted
  #    var/ world-writable (it only holds honeypot logs/state). Without this
  #    Cowrie can't create its SSH host key and port 22 stays dead.
  - mkdir -p /opt/tripwire/honeypot/var/log/cowrie /opt/tripwire/honeypot/var/lib/cowrie/downloads /opt/tripwire/honeypot/var/lib/cowrie/tty
  - chmod -R 777 /opt/tripwire/honeypot/var

  # 5. Launch.
  - cd /opt/tripwire/honeypot && docker compose up -d

  # ── Phase 2 (later): Tailscale tunnel to the Wazuh manager on TheHive-5.
  # - curl -fsSL https://tailscale.com/install.sh | sh
  # - tailscale up --auth-key=tskey-XXXX --hostname=tripwire-honeypot

final_message: "Tripwire honeypot up. Open 22/23/64295 in the VCN Security List too, then reconnect: ssh -p 64295 ubuntu@<public-ip>. Live capture: tail -f /opt/tripwire/honeypot/var/log/cowrie/cowrie.json"
