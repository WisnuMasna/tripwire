# Tripwire — Cowrie honeypot configuration.
# Only OVERRIDES of cowrie.cfg.dist are set here; the image layers this on top
# of its shipped defaults, so a partial file is expected and correct.

[honeypot]
# Fake hostname the attacker sees at the shell prompt after "logging in".
hostname = svr01

# Where session artifacts are written (relative to COWRIE_HOME=/cowrie/cowrie-git).
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads

# Record full TTY playback of each session (viewable with `cowrie playlog`).
ttylog = true
ttylog_path = var/lib/cowrie/tty

# Decide which logins succeed using etc/userdb.txt (see that file).
auth_class = UserDB

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0
# Banner attackers fingerprint on — mimic a common patched Ubuntu OpenSSH.
version = SSH-2.0-OpenSSH_8.2p1 Ubuntu-4ubuntu0.5

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# Structured JSON, one event per line — THIS is the file the pipeline consumes.
[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = true
